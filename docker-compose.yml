version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novachat-backend
    ports:
      - "8000:8000"
    volumes:
      # Ánh xạ thư mục backend (trừ các file bị bỏ qua bởi .dockerignore)
      # Để khi code thay đổi, server tự reload
      - ./backend:/app
      # Đảm bảo thư mục venv/node_modules không bị ghi đè từ host
      - /app/venv
    environment:
      - DATABASE_URL=sqlite:///./sql_app.db
      - SECRET_KEY=novachat-local-development-secret-key-123456
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: novachat-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: novachat-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Giúp hot-reload hoạt động trên Windows/Docker
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis-data:
