services:
  - type: web
    name: novachat-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: novachat-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: qwen2.5:3b
      - key: GEMINI_API_KEY
        sync: false
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: GEMINI_EMBEDDING_DIMENSION
        value: 768
      - key: BM25_MIN_SCORE
        value: 5.5
      - key: HYBRID_SEMANTIC_WEIGHT
        value: 0.7

  - type: web
    name: novachat-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: novachat-db
    plan: free
    databaseName: novachat
    user: novachat
