name: NovaChat CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./ci.db
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      REDIS_URL: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m compileall app
      - name: Chay test + do code coverage (gate >= 70%)
        run: |
          coverage run -p test_chat_api.py
          coverage run -p test_knowledge_listing.py
          coverage run -p test_phase4_chat.py
          coverage run -p test_workspace_rbac.py
          coverage run -p test_auth_users.py
          coverage run -p test_llm_provider.py
          coverage run -p test_workspace_crud.py
          coverage run -p -m pytest test_embeddings.py
          coverage run -p -m pytest test_retrieval.py
          coverage combine
          coverage report --fail-under=70
      - name: Quet lo hong bao mat (Bandit SAST)
        run: bandit -r app --severity-level high

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [frontend, widget]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
